# Matrix <-> ActivityPub federation bridge configuration.
#
# Copy this file to config.yaml and fill in real values. Secrets (tokens) should
# never be committed to version control.

bridge:
  # Public domain used to mint ActivityPub actor IDs, e.g. https://<domain>/actor/<user>
  domain: bridge.example.org

  # Base URL this bridge is publicly reachable at (may sit behind a reverse proxy
  # doing TLS termination, in which case this differs from listen_host/listen_port).
  public_base_url: https://bridge.example.org

  # Host/port the bridge's own HTTP server binds to.
  listen_host: 127.0.0.1
  listen_port: 8090

  # Address Synapse should push AppService transactions to. Defaults to
  # http://{listen_host}:{listen_port}; only set this if Synapse and the
  # bridge are on different hosts.
  # internal_base_url: http://127.0.0.1:8090

  # Auto-accept knocks from OTHER homeservers' users the same as local ones.
  # Off by default -- who gets auto-admitted into this server's rooms is
  # this server's call; anyone already in a room can still invite one manually.
  # accept_federated_knocks: false

  # Default post count for ";backfill" with no explicit argument. A Matrix
  # server admin can override this per-use; everyone else always gets this default.
  # backfill_default_count: 15

  # Join rule for a Remote User Room (a ghost's mirror of a remote fediverse
  # account). "knock" (default) lets anyone locked out ask their way back in
  # without an admin. "invite" or "public" also work; "restricted"/
  # "knock_restricted" aren't supported (need a space membership condition
  # this bridge doesn't set up).
  # ghost_room_join_rule: knock

  # Same as ghost_room_join_rule, but for a local user's own Profile Room
  # (";create profile"/";link profile"/";replace room"). Separate setting
  # since a local user's own room and a ghost's mirror of a stranger's
  # account are different trust situations.
  # local_profile_room_join_rule: knock

  # What an admin-allowlisted user on a DIFFERENT homeserver (see the
  # ";allow"/";disallow"/";allowed" commands) gets, once allowed:
  #   follow_only (default) - ";follow" and interact only. No Profile Room;
  #                            their AP identity is minted automatically on
  #                            first ";follow" with a bridge-held keypair,
  #                            and always mirrors their live Matrix display
  #                            name/avatar. No ";dm"/";chat"/";banner"/
  #                            ";replace room"/";backfill"/";repost".
  #   full                    - identical to a local user: self-service
  #                             ";create profile"/";link profile", full
  #                             control of their own Profile Room, DM, Chat.
  # A single deployment-wide setting, live and reversible -- flipping it
  # doesn't touch any already-provisioned identity, it just changes what's
  # reachable going forward (see this option's own docstring in
  # bridge/config.py for the exact rules).
  # third_party_access_mode: follow_only

  # Matrix polls have no expiry; some fediverse receivers (Mastodon-family)
  # refuse a poll with none at all. This many days from creation is sent as
  # the poll's endTime instead of omitting it.
  # poll_default_duration_days: 7

  # Set org.matrix.msc4501.social.profile_room_id (MSC4133 Extensible
  # Profiles) on every ghost, pointing at its Remote User Room. Off by
  # default -- Synapse doesn't enable MSC4133 by default either (needs
  # experimental_features.msc4133_enabled: true in homeserver.yaml). Turn
  # on once your homeserver actually supports it.
  # set_msc4501_profile_room_id: false

  # Set org.matrix.msc4503.external_handle (MSC4503, "External Protocol
  # Handles") on every ghost -- carrying its actual ActivityPub handle
  # (e.g. "@alice@mastodon.social"). One of:
  #   - "off" (default)
  #   - "profile": an MSC4133 profile field on the ghost's own account
  #     (needs the same homeserver support as set_msc4501_profile_room_id
  #     above)
  #   - "events": a snapshot on every event the ghost sends (no such
  #     dependency)
  #   - "both"
  # Changing this only affects ghosts going forward -- an admin can force
  # an existing ghost's profile field into line with a new value (set,
  # updated, or removed) right away via ";refresh".
  # msc4503_external_handle: off

  # Set org.matrix.msc4501.social.relates_to on every mirrored repost,
  # quote-post, and cross-posted reply echo. On by default -- purely
  # additive content a non-MSC4501 client just ignores.
  # set_msc4501_relates_to: true

  # For a mirrored repost, assert content_inline (the event's own content
  # already IS the reposted post's content) instead of duplicating that
  # content a second time into relates_to.content. On by default. Turn off
  # to restore the old duplicate-into-relates_to.content behavior, e.g. if
  # a client you care about doesn't handle content_inline yet.
  # use_msc4501_content_inline: true

  # Whether an untracked quote-post's TARGET gets imported into its own
  # Remote User Room (needed for relates_to to populate on it at all).
  #   known  (default) - only if the quoted author already has a Remote
  #                       User Room for some other reason
  #   always            - import unconditionally
  #   never             - read-only preview only, relates_to stays unset
  # quote_import_policy: known

  # Mirror a remote account's posts using org.matrix.msc4501.social.post as
  # the event TYPE instead of m.room.message. Off by default, and NOT
  # RECOMMENDED until Phase 2 of MSC4501's rollout plan -- unlike the
  # relates_to/content_inline options above, this changes the event's
  # actual type, so a non-MSC4501 client won't render it at all.
  # use_msc4501_post_event_type: false

  # MXIDs treated as bridge admins regardless of Synapse server-admin
  # status. Always additive -- a real Synapse admin not listed here still
  # gets bridge-admin rights too as long as use_synapse_admin_api (below)
  # is on.
  # admins: []

  # Whether the bridge is allowed to call Synapse's own Admin API (used to
  # check whether an arbitrary OTHER user is a server admin, and to
  # enumerate an arbitrary OTHER user's rooms for ;delete profile/;leave
  # unfollowed). On by default. Turning this off is what lets the bridge
  # run against a homeserver that doesn't support Synapse's Admin API --
  # EXPERIMENTAL: only tested with Synapse. Untested on all other
  # homeservers. Admin status then relies entirely on the `admins` list
  # above, and the two room-sweep commands fall back to a slower,
  # bridge-wide scan. Spot-test every admin-gated command and
  # watch this bridge's own logs closely if you turn this off.
  # use_synapse_admin_api: true

synapse:
  # Synapse Client-Server / Admin API base URL, as reachable from the bridge process.
  base_url: http://localhost:8008
  # The homeserver's server_name (the part after the colon in @user:server.name).
  server_name: matrix.example.org
  # Access token for an account with admin: true, used for the Admin API.
  # Only required while bridge.use_synapse_admin_api (above) is on, the default.
  admin_token: "syt_replace_me"

appservice:
  # Path to the AppService registration YAML. Generate it with:
  #   python -m bridge.appservice config.yaml appservice-registration.yaml
  # and add the resulting path to Synapse's homeserver.yaml `app_service_config_files`.
  registration_path: ./appservice-registration.yaml
  # Unique appservice id, must match the `id` field in the registration file.
  id: matrix-appservice-activitypub
  # hs_token / as_token are shared secrets you generate yourself -- not issued
  # by Synapse or anything else. They just need to be long, random, and
  # different from each other (treat them like passwords). Generate a pair with:
  #   python3 -c "import secrets; print(secrets.token_hex(32))"
  # hs_token is what Synapse presents to the bridge on every request (to push
  # AppService transactions); as_token is what the bridge presents to Synapse
  # on every Client-Server API call.
  hs_token: "hs_replace_me"
  as_token: "as_replace_me"
  # Localpart prefix for ghosted ActivityPub users,
  # e.g. "ap_" -> @ap_user_instance.org:bridge.example.org
  user_prefix: "ap_"
  # Localpart of the bridge bot user that handles !bridge commands.
  bot_localpart: "bridgebot"
  # Optional display name / avatar for the bot's own Matrix profile. Applied
  # on every startup; leave unset to not manage either.
  # bot_display_name: "Fediverse Bridge"
  # bot_avatar_mxc must be an mxc:// URI, not a file path or http(s) URL --
  # upload an image with any Matrix client (or reuse one already on your
  # server) and copy its mxc:// URI from there.
  # bot_avatar_mxc: "mxc://bridge.example.org/SomeMediaId"

storage:
  # Directory for the bridge's own bookkeeping state (actor keypairs, sqlite cache).
  # No ActivityPub post content or media is stored here -- that lives in Matrix.
  data_dir: ./data
  # "sqlite" (default) -- a single file at {data_dir}/bridge.db, no setup
  # needed. "postgresql" -- connects to the server described below instead;
  # useful if you already run Postgres for something else (e.g. Synapse
  # itself) and would rather not also manage a separate sqlite file, or need
  # the bridge's bookkeeping reachable from more than one host. Either way
  # the data stored is identical -- same tables, same content -- so this can
  # be changed later without losing anything currently tracked (there's no
  # automatic migration between the two yet, though: switching backends on
  # an existing deployment starts that backend's storage empty).
  backend: sqlite
  # Only read when backend is "postgresql". Either set `dsn` directly
  # (postgresql://user:pass@host:port/dbname) or fill in the discrete
  # fields below -- `dsn` wins if both are present. The discrete form exists
  # mainly so a password with special characters doesn't have to be
  # hand-URL-escaped into a DSN string here.
  # postgres:
  #   dsn: "postgresql://matrix_appservice_activitypub:replace_me@localhost:5432/matrix_appservice_activitypub"
  #   host: localhost
  #   port: 5432
  #   database: matrix_appservice_activitypub
  #   user: matrix_appservice_activitypub
  #   password: "replace_me"
  #   min_pool_size: 1
  #   max_pool_size: 10

federation:
  # Timeout (seconds) for outgoing ActivityPub HTTP requests (inbox delivery,
  # actor/webfinger lookups).
  request_timeout: 15
  # How long fetched remote actor public keys are cached, in seconds.
  actor_key_cache_ttl: 3600
  # Maximum allowed clock skew (seconds) between the Date header on an incoming
  # signed request and local time, before the signature is rejected.
  max_clock_skew: 3600
  # How far in the past (days) a mirrored post's own "published" time is
  # trusted to set the Matrix event's displayed timestamp, before falling
  # back to "now" instead. Keep this comfortably BELOW your homeserver's own
  # retention.default_policy.max_lifetime, if you have one configured in
  # homeserver.yaml -- confirmed live that Synapse silently accepts (200 OK)
  # but never actually persists/exposes an event whose custom timestamp is
  # older than that policy allows, which is worse than just showing "now".
  # There's no way for the bridge to detect your retention policy on its
  # own, so this must be set by hand. Raise it (or set a very large value)
  # if your homeserver has no retention policy limiting history at all.
  max_backdate_days: 730

logging:
  # ERROR by default to keep the service journal quiet -- switch to INFO
  # temporarily (systemctl edit / restart) only while actively investigating
  # an issue, then switch back.
  level: ERROR
